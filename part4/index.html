<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of Places</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html"><img class="logo" src="images/logo.png" alt="HBnB Logo" width="100"></a>
            <div>
                <a href="login.html" id="login-link">Login</a>
                <button id="theme-toggle"><img src="images/sun.png" alt="Theme switch" width="24"></button>
            </div>
        </nav>
    </header>
    <main>
        <section id="filter">
            <label for="price-filter">Max Price:</label>
            <select id="price-filter">
                <option value="all">All</option>
                <option value="10">10</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
        </section>
        <section id="places-list">
            <!-- List of places will be populated dynamically -->
        </section>
    </main>
    <script src="scripts.js"></script>
</body>
</html>
