<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Details</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html"><img src="images/logo.png" alt="HBnB Logo" width="100"></a>
            <div>
                <a href="login.html" id="login-link">Login</a>
                <button id="theme-toggle"><img src="images/sun.png" alt="Theme switch" width="24"></button>
            </div>
        </nav>
    </header>
    <main>
        <div class="details-review-container">
            <section class="place-details">
                <div id="place-details"></div>
                <!-- Place details will be populated dynamically -->
            </section>
            <div class="review-wrap">
                <section id="reviews">
                    <!-- Reviews will be populated dynamically -->
                </section>
                <section id="add-review">
                    <h2>Add a Review</h2>
                    <form id="review-form">
                        <label for="review-text">Review:</label>
                        <textarea id="review-text" name="review-text" required></textarea>

                        <input id="rating" type="number" style="display: none;" value="1">
                        <div class="star-container">
                            <img id="star-1" src="images/star_bg.png" width="20" alt="Star">
                            <img id="star-2" src="images/star.png" width="20" alt="Star">
                            <img id="star-3" src="images/star.png" width="20" alt="Star">
                            <img id="star-4" src="images/star.png" width="20" alt="Star">
                            <img id="star-5" src="images/star.png" width="20" alt="Star">
                        </div>

                        <button type="submit">Submit</button>
                    </form>
                </section>
            </div>
        </div>
    </main>
    <script src="scripts.js"></script>
</body>
</html>
