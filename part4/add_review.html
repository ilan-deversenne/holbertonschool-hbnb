<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Review</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <!-- Add something to idfentify the place you're reviewing -->

        <h1 id="reviewing-title">Reviewing: <span id="place-title"></span></h1>

        <div class="review-page-container">

            <section id="add-review">
                <h2>Add a Review</h2>

                <form id="review-form">
                    <label for="review-text">Review:</label>
                    <textarea id="review-text" name="review-text" required></textarea>
                    <input id="rating" type="number" style="display: none;" value="1">

                    <div class="star-container">
                        <img id="star-1" src="images/star_bg.png" width="20" alt="Star">
                        <img id="star-2" src="images/star.png" width="20" alt="Star">
                        <img id="star-3" src="images/star.png" width="20" alt="Star">
                        <img id="star-4" src="images/star.png" width="20" alt="Star">
                        <img id="star-5" src="images/star.png" width="20" alt="Star">
                    </div>

                    <button type="submit">Submit</button>
                </form>
            </section>

        </div>
    </main>
    <script src="scripts.js"></script>
</body>
</html>
